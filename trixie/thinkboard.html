<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --clr-text-on-bg: #ebebeb;
            --clr-bg: #03070D;
            --clr-piano-bg: #15181f;
            --clr-line: #0009;
            --clr-primary: #FFD18C;
            --clr-primary-2: #A1C495;
        }

        *, ::after, ::before {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--clr-piano-bg);
            height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            
            -webkit-font-smoothing: antialiased;
            line-height: 1.6; 
            color: #333;
        }

        .row {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
        }

        .bar {
            width: 100%;
            height: 300px;
            /* Adjust the 20px to change the spacing between lines */
            background: repeating-linear-gradient(
                to bottom,
                #0003,         /* Line color */
                #0003 1px,     /* Line thickness */
                transparent 1px, 
                transparent 20px /* Total width of one pattern cycle */
            );
        }
    </style>
</head>
<body>
    <div class="row">
        <!-- piano placeholder, for my own sanity only -->
        <div style="border-right: 2px solid #0001; width: 100px; height: 100%; background-color: rgb(209, 209, 209);">
    
        </div>
        <div class="bar" style="width: 160px; height: 100%; "><div style="width: 100%; height: 100%; background: #ffffff03"></div></div>
        <div class="bar" style="width: 160px; height: 100%; ">
            <div style="width: 100%; height: 20px; margin-top: 120px; border-radius: 2px; outline: 1px solid #0009; background-color: var(--clr-primary); display: flex; justify-content: flex-start; align-items: center; padding: 4px;">
                <div style="opacity: 0.6; font-size: 0.9rem; font-weight: 600;">
                    D#5
                </div>
            </div>
        </div>
        <div class="bar" style="width: 160px; height: 100%; "><div style="width: 100%; height: 100%; background: #ffffff03">
            <div style="width: 50%; height: 20px; margin-top: 140px; border-radius: 2px; outline: 1px solid #0009; background-color: var(--clr-primary); display: flex; justify-content: flex-start; align-items: center; padding: 4px;">
                <div style="opacity: 0.6; font-size: 0.9rem; font-weight: 600;">
                    D5
                </div>
            </div>
        </div></div>
        <div class="bar" style="width: 160px; height: 100%; border-right: 2px solid var(--clr-line);"></div>
        <div class="bar" style="width: 160px; height: 100%; "><div style="width: 100%; height: 100%; background: #ffffff03"></div></div>
        <div class="bar" style="width: 160px; height: 100%; "></div>
        <div class="bar" style="width: 160px; height: 100%; "><div style="width: 100%; height: 100%; background: #ffffff03"></div></div>
        <div class="bar" style="width: 160px; height: 100%; border-right: 2px solid var(--clr-line);"></div>
        <div class="bar" style="width: 160px; height: 100%; "><div style="width: 100%; height: 100%; background: #ffffff03"></div></div>
        <div class="bar" style="width: 160px; height: 100%; "></div>
        <div class="bar" style="width: 160px; height: 100%; "><div style="width: 100%; height: 100%; background: #ffffff03"></div></div>
        <div class="bar" style="width: 160px; height: 100%; border-right: 2px solid var(--clr-line);"></div>
    </div>
</body>
</html>
